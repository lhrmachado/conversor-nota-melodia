<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Melodia por Nome</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#1c1f2b;
color:white;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{

background:#2a2f44;
padding:30px;
border-radius:12px;
max-width:900px;
width:100%;
box-sizing:border-box;

}

h1{
margin-top:0;
}

input,select{

font-size:16px;
padding:12px;
width:100%;
max-width:300px;
margin:8px 0;
border-radius:6px;
border:none;
box-sizing:border-box;

}

label{
display:block;
margin-top:10px;
}

.controls{

display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;

}

button{

padding:12px 18px;
cursor:pointer;
border:none;
border-radius:8px;
background:#4b6cff;
color:white;
font-size:15px;
flex-grow:1;

}

button:hover{
background:#6d87ff;
}

#melodia{

margin-top:20px;
font-size:18px;
line-height:1.6;
word-wrap:break-word;

}

@media (max-width:600px){

h1{
font-size:22px;
}

button{
font-size:14px;
padding:10px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Gerador de Melodia por Nome</h1>

<input id="nome" placeholder="Digite seu nome">

<select id="instrumento">

<option value="synth">Sintetizador</option>
<option value="organ">Órgão</option>
<option value="strings">Cordas</option>

</select>

<label>BPM</label>
<input type="number" id="bpm" value="100" min="40" max="200">

<div class="controls">

<button onclick="converter()">Gerar Melodia</button>
<button onclick="togglePlay()" id="playBtn">Play</button>
<button onclick="baixarMusicXML()">Exportar MusicXML</button>

</div>

<h3>Sequência de notas</h3>

<p id="melodia"></p>

</div>

<script>

let melodiaGlobal=[]
let synth
let tocando=false
let eventos=[]

const tabelaReferencial={
A:"A",B:"B",C:"C",D:"D",E:"E",F:"F",G:"G",
H:"F#",I:"Bb",J:"C#",K:"ATONAL",
L:"Eb",M:"G#",N:"Ab",O:"D#",P:"Db",
Q:"A#",R:"Gb",S:"E#",T:"Cb",U:"B#",
V:"Fb",W:"MAIOR",X:"MENOR",Y:"MODAL",
Z:"TRANSPOSIÇÃO LIMITADA"
}

const cromaticaSharp=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
const cromaticaFlat=["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"]

function grauLetra(l){

const mapa={
A:1,N:1,B:2,O:2,C:3,P:3,D:4,Q:4,
E:5,R:5,F:6,S:6,G:7,T:7,H:8,U:8,
I:9,V:9,J:10,W:10,K:11,X:11,
L:12,Y:12,M:13,Z:13
}

return mapa[l]

}

function gerarEscala(base){

let usarFlat=base.includes("b")
let escalaBase=usarFlat?cromaticaFlat:cromaticaSharp
let index=escalaBase.indexOf(base)

let escala=[]

for(let i=0;i<13;i++){
escala.push(escalaBase[(index+i)%12])
}

return escala

}

function temAcento(c){
return /[áàâãéèêíìîóòôõúùûç]/i.test(c)
}

function converter(){

let nomeOriginal=document.getElementById("nome").value
let nome=nomeOriginal.toUpperCase()

let primeira=nome[0]
let ref=tabelaReferencial[primeira]

if(ref=="MAIOR"||ref=="MENOR"||ref=="MODAL"||ref=="TRANSPOSIÇÃO LIMITADA"||ref=="ATONAL"){
ref=tabelaReferencial[nome[1]]
}

let escala=gerarEscala(ref)

let melodia=[]

for(let i=0;i<nomeOriginal.length;i++){

let c=nomeOriginal[i]
let letra=nome[i]

if(c===" "){
melodia.push("|")
continue
}

if(temAcento(c)){
melodia.push("(pausa)")
continue
}

let grau=grauLetra(letra)

if(grau){
melodia.push(escala[grau-1])
}

}

melodiaGlobal=melodia

document.getElementById("melodia").innerText=melodia.join(" - ")

}

async function togglePlay(){

await Tone.start()

if(!tocando){

let tipo=document.getElementById("instrumento").value

if(tipo==="synth"){
synth=new Tone.PolySynth(Tone.Synth).toDestination()
}

if(tipo==="organ"){
synth=new Tone.PolySynth(Tone.FMSynth).toDestination()
}

if(tipo==="strings"){
synth=new Tone.PolySynth(Tone.Synth,{
envelope:{
attack:0.5,
decay:0.2,
sustain:0.9,
release:1.5
}
}).toDestination()
}

let bpm=document.getElementById("bpm").value
Tone.Transport.bpm.value=bpm

let tempo=0

melodiaGlobal.forEach(n=>{

if(n==="|"||n==="(pausa)"){
tempo+=0.5
return
}

let id=Tone.Transport.schedule(time=>{
synth.triggerAttackRelease(n+"4","8n",time)
},tempo)

eventos.push(id)

tempo+=0.5

})

Tone.Transport.start()

document.getElementById("playBtn").innerText="Stop"

tocando=true

}else{

Tone.Transport.stop()

eventos.forEach(e=>Tone.Transport.clear(e))

eventos=[]

document.getElementById("playBtn").innerText="Play"

tocando=false

}

}

function baixarMusicXML(){

let notasPorCompasso=4
let contador=0
let numeroCompasso=1

let xml=`<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE score-partwise PUBLIC
"-//Recordare//DTD MusicXML 3.1 Partwise//EN"
"https://www.musicxml.org/dtds/partwise.dtd">

<score-partwise version="3.1">

<part-list>
<score-part id="P1">
<part-name>Melodia</part-name>
</score-part>
</part-list>

<part id="P1">

<measure number="1">

<attributes>
<divisions>1</divisions>
<key>
<fifths>0</fifths>
</key>
<time>
<beats>4</beats>
<beat-type>4</beat-type>
</time>
<clef>
<sign>G</sign>
<line>2</line>
</clef>
</attributes>
`

melodiaGlobal.forEach(n=>{

if(contador===notasPorCompasso){

xml+=`</measure><measure number="${++numeroCompasso}">`
contador=0

}

if(n==="|"||n==="(pausa)"){

xml+=`
<note>
<rest/>
<duration>1</duration>
<voice>1</voice>
<type>quarter</type>
</note>
`

}else{

let step=n[0]

let alterTag=""

if(n.includes("#")){
alterTag="<alter>1</alter>"
}

if(n.includes("b")){
alterTag="<alter>-1</alter>"
}

xml+=`
<note>
<pitch>
<step>${step}</step>
${alterTag}
<octave>4</octave>
</pitch>
<duration>1</duration>
<voice>1</voice>
<type>quarter</type>
</note>
`

}

contador++

})

xml+=`
</measure>
</part>
</score-partwise>
`

let blob=new Blob([xml],{type:"application/xml"})

let url=URL.createObjectURL(blob)

let link=document.createElement("a")

link.href=url
link.download="melodia.musicxml"

link.click()

}

</script>

</body>
</html>
